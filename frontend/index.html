<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/pwa-512.png" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/pwa-512.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/pwa-512.png" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Reto — el juego del grupo hasta el 29 de agosto. Puntos, historias, arena y más." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Reto" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Reto</title>
    <style>
      #boot-splash {
        min-height: 100%;
        min-height: -webkit-fill-available;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #050508;
      }
      #boot-splash img {
        width: 4.5rem;
        height: 4.5rem;
        opacity: 0.9;
      }
      #boot-splash .bar {
        width: 7rem;
        height: 0.25rem;
        border-radius: 9999px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
        animation: boot-pulse 1.2s ease-in-out infinite;
      }
      @keyframes boot-pulse {
        0%, 100% { opacity: 0.35; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash" aria-hidden="true">
        <img src="/pwa-192.png" alt="" width="72" height="72" fetchpriority="high" decoding="async" />
        <div class="bar"></div>
      </div>
    </div>
    <script>
      (function () {
        function apply() {
          var el = document.createElement('div');
          el.style.cssText =
            'position:fixed;top:0;left:0;visibility:hidden;pointer-events:none;' +
            'padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)';
          document.documentElement.appendChild(el);
          var s = getComputedStyle(el);
          var root = document.documentElement;
          root.style.setProperty('--safe-top', s.paddingTop);
          root.style.setProperty('--safe-right', s.paddingRight);
          root.style.setProperty('--safe-bottom', s.paddingBottom);
          root.style.setProperty('--safe-left', s.paddingLeft);
          root.style.setProperty('--viewport-bottom-gap', '0px');
          el.remove();
        }
        apply();
        window.addEventListener('resize', apply, { passive: true });
        window.addEventListener('orientationchange', function () { setTimeout(apply, 80); });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
